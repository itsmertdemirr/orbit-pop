name: Orbit Pop - GitHub Pages Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Orbit Pop
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Projeyi indir
        uses: actions/checkout@v6

      - name: GitHub Pages'i hazırla
        uses: actions/configure-pages@v5

      - name: Oyun dosyalarını yükle
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: GitHub Pages'te yayınla
        id: deployment
        uses: actions/deploy-pages@v4
